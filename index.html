<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHẠM - GRILL & CHILL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0f1a11; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?q=80&w=1000');
            background-size: cover; background-attachment: fixed; color: white;
        }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 3.5em; font-weight: 800; margin: 0; letter-spacing: 10px; color: var(--gold); font-style: italic; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 16px; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.08); padding: 15px; margin-bottom: 10px; border-radius: 15px; }
        .item-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: var(--gold); border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .qty-num { font-weight: bold; min-width: 25px; text-align: center; color: var(--gold); }
        
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3d1a; padding: 20px; display: none; text-align: center; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); z-index: 1000; }
        .btn-order { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1.1em; width: 100%; text-transform: uppercase; }
        
        /* Màn hình chờ & Bảng kê món */
        #waiting-screen { display: none; text-align: center; padding-top: 50px; }
        .bill-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 5px; margin-bottom: 10px; font-size: 0.85em; }
        .bill-line { display: grid; grid-template-columns: 2fr 1fr 1.5fr; gap: 5px; font-size: 0.9em; padding: 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.15); text-align: left; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div id="main-app" class="container">
    <div class="header"><h1>CHẠM</h1><p id="table-display" style="letter-spacing: 3px; font-weight: bold; color: var(--gold);">Đang tải bàn...</p></div>
    <div class="card" id="user-info">
        <h3 style="margin-top:0; color:var(--gold)">Thông tin đặt bàn</h3>
        <input type="text" id="cust-name" placeholder="Tên của bạn">
        <input type="number" id="cust-phone" placeholder="Số điện thoại">
    </div>
    <div id="menu-list" style="padding-bottom: 120px;"></div>
</div>

<div id="waiting-screen" class="container">
    <div class="header"><h1>CHẠM</h1></div>
    <div class="card">
        <h2 style="color:var(--gold); font-size: 1.8em; margin-bottom: 5px;">ĐÃ GỬI ĐƠN!</h2>
        <p>Bàn <b id="wait-table" style="color:var(--gold)">--</b> đang được chuẩn bị.</p>
        <hr style="opacity: 0.3; margin: 15px 0;">
        
        <div class="bill-header">
            <span style="width: 45%;">Tên món</span>
            <span style="width: 20%; text-align: center;">SL</span>
            <span style="width: 35%; text-align: right;">Thành tiền</span>
        </div>
        <div id="order-history" style="margin-bottom: 15px;"></div>
        
        <div style="text-align: right; border-top: 1px solid var(--gold); padding-top: 10px;">
            <b style="font-size: 1.2em;">TỔNG CỘNG: <span id="wait-total" style="color:var(--gold);">0đ</span></b>
        </div>
        <p style="font-style: italic; font-size: 0.8em; opacity: 0.6; margin-top: 25px;">Cảm ơn quý khách đã tin tưởng CHẠM!</p>
    </div>
</div>

<div id="cart-bar">
    <button class="btn-order" onclick="sendOrder()">XÁC NHẬN ĐẶT MÓN</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD48i9LuaLL3alq-gyoqoUvhH9Ingse3oM",
        authDomain: "quannuongnhatoi-1ce85.firebaseapp.com",
        databaseURL: "https://quannuongnhatoi-1ce85-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quannuongnhatoi-1ce85",
        storageBucket: "quannuongnhatoi-1ce85.firebasestorage.app",
        messagingSenderId: "1036759149619",
        appId: "1:1036759149619:web:3d301711d7a2f683244746"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const table = urlParams.get('ban') || "Mang về";
    document.getElementById('table-display').innerText = "BÀN SỐ: " + table;
    document.getElementById('wait-table').innerText = table;

    let cart = {};

    // THEO DÕI ĐƠN HÀNG THỜI GIAN THỰC
    db.ref('orders').on('value', snap => {
        let myCurrentOrder = null;
        snap.forEach(child => {
            if(child.val().table === table) {
                myCurrentOrder = child.val();
            }
        });

        if(myCurrentOrder) {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('cart-bar').style.display = 'none';
            document.getElementById('waiting-screen').style.display = 'block';
            
            let htmlItems = '';
            let total = 0;
            myCurrentOrder.items.forEach(item => {
                let subtotal = item.price * item.qty;
                total += subtotal;
                htmlItems += `
                    <div class="bill-line">
                        <span style="font-weight: bold;">${item.name}</span>
                        <span class="text-center">${item.qty}</span>
                        <span class="text-right">${subtotal.toLocaleString()}đ</span>
                    </div>`;
            });
            document.getElementById('order-history').innerHTML = htmlItems;
            document.getElementById('wait-total').innerText = total.toLocaleString() + "đ";
        } else {
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('waiting-screen').style.display = 'none';
            cart = {}; 
            updateCartUI();
        }
    });

    // TẢI THỰC ĐƠN
    db.ref('menu').on('value', snap => {
        let h = '';
        snap.forEach(c => {
            let m = c.val();
            let mId = c.key;
            h += `<div class="menu-item">
                <div><b>${m.name}</b><br><small>${m.price.toLocaleString()}đ / ${m.unit || 'Món'}</small></div>
                <div class="item-controls">
                    <button class="btn-qty" onclick="changeQty('${mId}', '${m.name}', ${m.price}, -1)">-</button>
                    <span class="qty-num" id="qty-${mId}">0</span>
                    <button class="btn-qty" onclick="changeQty('${mId}', '${m.name}', ${m.price}, 1)">+</button>
                </div>
            </div>`;
        });
        document.getElementById('menu-list').innerHTML = h;
    });

    function changeQty(id, name, price, delta) {
        if (!cart[id]) {
            cart[id] = { name: name, price: price, qty: 0 };
        }
        cart[id].qty += delta;
        if (cart[id].qty < 0) cart[id].qty = 0;
        
        document.getElementById('qty-' + id).innerText = cart[id].qty;
        updateCartUI();
    }

    function updateCartUI() {
        let count = 0;
        for (let id in cart) { count += cart[id].qty; }
        document.getElementById('cart-bar').style.display = count > 0 ? 'block' : 'none';
    }

    function sendOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if(!name || !phone) return alert("Vui lòng nhập Tên và SĐT để Quán phục vụ!");

        let finalItems = [];
        for (let id in cart) {
            if (cart[id].qty > 0) finalItems.push(cart[id]);
        }

        if(finalItems.length === 0) return alert("Bạn chưa chọn món nào!");

        db.ref('orders').push({
            table: table,
            customer: name + " - " + phone,
            items: finalItems,
            time: new Date().toLocaleTimeString('vi-VN')
        }).then(() => {
            alert("Đặt món thành công!");
        });
    }
</script>
</body>
</html>
